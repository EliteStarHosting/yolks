name: Build GraalVM Yolks

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        java: [17, 21, 23, 25]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./graalvm
          file: ./graalvm/java_${{ matrix.java }}/Dockerfile
          push: true
          tags: ghcr.io/elitestarhosting/yolks:java_${{ matrix.java }}_graal
